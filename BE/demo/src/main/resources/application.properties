spring.application.name=demo

server.address=${SERVER_ADDRESS:0.0.0.0}
server.port=${PORT:${SERVER_PORT:8080}}

spring.datasource.url=${WAREHOUSE_DB_URL}
spring.datasource.username=${WAREHOUSE_DB_USERNAME}
spring.datasource.password=${WAREHOUSE_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.example.demo.dto

auth.token.ttl-hours=${AUTH_TOKEN_TTL_HOURS:168}

# Render/Vercel/로컬 개발을 모두 고려한 기본 CORS 패턴
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://192.168.*.*:*,http://10.*.*.*:*,http://172.16.*.*:*,http://172.17.*.*:*,http://172.18.*.*:*,http://172.19.*.*:*,http://172.20.*.*:*,http://172.21.*.*:*,http://172.22.*.*:*,http://172.23.*.*:*,http://172.24.*.*:*,http://172.25.*.*:*,http://172.26.*.*:*,http://172.27.*.*:*,http://172.28.*.*:*,http://172.29.*.*:*,http://172.30.*.*:*,http://172.31.*.*:*,https://*.vercel.app}