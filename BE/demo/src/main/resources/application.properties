spring.application.name=demo

spring.datasource.url=${WAREHOUSE_DB_URL:jdbc:mysql://localhost:3306/warehouse_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${WAREHOUSE_DB_USERNAME:root}
spring.datasource.password=${WAREHOUSE_DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.example.demo.dto

auth.token.ttl-hours=${AUTH_TOKEN_TTL_HOURS:168}
