services:
  db:
    image: mysql:8.0
    container_name: warehouse-db
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      TZ: ${TZ:-Asia/Seoul}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-warehouse_db}
      MYSQL_USER: ${MYSQL_USER:-warehouse_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-warehouse_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-warehouse_root_password}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./DB/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./DB/view.sql:/docker-entrypoint-initdb.d/02-view.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - warehouse_net

  backend:
    build:
      context: ./BE/demo
      dockerfile: Dockerfile
    container_name: warehouse-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Seoul}
      SERVER_PORT: 8080
      WAREHOUSE_DB_URL: "jdbc:mysql://db:3306/${MYSQL_DATABASE:-warehouse_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=utf8"
      WAREHOUSE_DB_USERNAME: ${MYSQL_USER:-warehouse_user}
      WAREHOUSE_DB_PASSWORD: ${MYSQL_PASSWORD:-warehouse_password}
      AUTH_TOKEN_TTL_HOURS: ${AUTH_TOKEN_TTL_HOURS:-168}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - warehouse_net

  frontend:
    build:
      context: ./FE/WareBoard
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: warehouse-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    networks:
      - warehouse_net

volumes:
  mysql_data:

networks:
  warehouse_net:
    driver: bridge
